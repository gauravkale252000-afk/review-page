<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChaiKaapi Talegaon Reviews</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#FFE7C7,#FFF5E8);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:#fff;
width:340px;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
text-align:center;
}

.logo{
width:130px;
height:130px;
border-radius:50%;
object-fit:cover;
margin-bottom:15px;
}

h1{
margin:10px 0;
color:#6B3F1D;
}

p{
color:#666;
margin-bottom:25px;
}

.btn{
display:block;
padding:16px;
margin:15px 0;
border-radius:12px;
text-decoration:none;
font-size:20px;
font-weight:bold;
color:#fff;
}

.google{
background:#4285F4;
}

.zomato{
background:#E23744;
}

.footer{
margin-top:20px;
font-size:14px;
color:#888;
}
</style>

</head>

<body>

<div class="card">

<img class="logo" src="logo.jpg" alt="ChaiKaapi Logo">

<h1>ChaiKaapi Talegaon</h1>

<p>Choose where you'd like to leave your review ❤️</p>

<a class="btn google" href="https://search.google.com/local/writereview?placeid=ChIJFyOlqOmvwjsR5-iudu1jiyc">
⭐ Google Review
</a>

<a class="btn zomato" href="https://www.zomato.com">
🍽️ Zomato Review
</a>

<div class="footer">
🙏 Thank you for visiting ChaiKaapi
</div>

</div>

</body>
</html>
